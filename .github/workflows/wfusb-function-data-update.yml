name: WFUSB Function Data Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.wfusb-function-data-trigger.txt'
      - '.github/workflows/wfusb-function-data-update.yml'

permissions:
  contents: write

jobs:
  update-function-data:
    if: ${{ !contains(github.event.head_commit.message, '[skip function data]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install parser
        run: python -m pip install beautifulsoup4
      - name: Update MSBA function tables
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup
          import subprocess
          years=[2018,2019,2020,2021,2022,2023,2024,2025]
          rows=[
            ('Analytics / Data Analytics',[28,56,33,25,67,34,55,35]),
            ('Consulting',[8,6,12,10,21,8,8,5]),
            ('Finance',[2,2,5,2,12,4,14,8]),
            ('Other / Unclassified',[4,2,5,8,9,6,11,4]),
            ('Operations / Supply Chain',[3,3,0,4,3,9,5,4]),
            ('Marketing / Sales',[0,4,1,2,5,4,6,4]),
            ('Information Technology',[1,2,0,0,7,2,4,4]),
            ('Accounting',[0,0,1,0,2,5,0,2]),
            ('Education',[0,0,0,3,0,1,1,1]),
            ('General Management',[0,0,0,1,0,1,0,3]),
            ('Logistics',[1,0,0,0,2,0,0,2]),
            ('Advertising/Public Relations',[0,0,1,0,0,1,1,0]),
            ('Finance Analytics',[0,0,1,0,0,0,0,0]),
            ('Human Resources',[0,0,0,0,0,0,0,1]),
          ]
          grand=617
          totals=[47,75,59,55,128,75,105,73]
          def pct(n): return f'{n/grand*100:.1f}%'
          def table_row(name, vals, muted=False):
              style=' style="color:var(--text-muted)"' if muted else ''
              vals_html=''.join(f'<td{style}>{v}</td>' for v in vals)
              return f'<tr><td{style}>{name}</td>{vals_html}<td{style}><strong>{sum(vals)}</strong></td></tr>'
          insights='''<div class="insight-row"><div class="insight-card"><span class="insight-num">54.0%</span><span class="insight-label">Analytics / Data Analytics<br/><small style="color:var(--text-muted)">333 students · #1 function</small></span></div><div class="insight-card"><span class="insight-num">12.6%</span><span class="insight-label">Consulting<br/><small style="color:var(--text-muted)">78 students · #2 function</small></span></div><div class="insight-card"><span class="insight-num">7.9%</span><span class="insight-label">Finance<br/><small style="color:var(--text-muted)">49 students · #3 function</small></span></div><div class="insight-card"><span class="insight-num">74.6%</span><span class="insight-label">Top 3 functions combined<br/><small style="color:var(--text-muted)">460 of 617 outcomes</small></span></div></div>'''
          ov_body=''
          imps=['Largest function signal in the updated FDS extract; prioritize related job titles, employers, alumni, and skill evidence.','Major recurring function; use this as a high-priority search lane while comparing fit with adjacent pathways.','Major recurring function; use this as a high-priority search lane while comparing fit with adjacent pathways.','Residual or uncoded function records; use employer, job-title, and coaching evidence to interpret these outcomes.']
          for idx,(name,vals) in enumerate(rows):
              count=sum(vals)
              if name=='Other / Unclassified': rank='—'; color='var(--text-muted)'; imp=imps[3]
              else:
                  rank=str(sum(1 for n,_ in rows[:idx+1] if n!='Other / Unclassified'))
                  color=['#6B5520','#1D4ED8','#166534','#B45309','#7C3AED','#0891B2'][min(int(rank)-1,5)]
                  imp=imps[int(rank)-1] if int(rank)<=3 else ('Meaningful secondary pathway; validate current openings and build role-specific evidence before narrowing.' if count>=18 else 'Lower-volume but legitimate pathway; use targeted employer research and a clear story if pursuing this direction.')
              fn=f'<strong>{name}</strong>' if rank in ['1','2','3'] else name
              ov_body += f'<tr><td>{rank}</td><td>{fn}</td><td>{count}</td><td>{pct(count)}</td><td style="color:{color};">{imp}</td></tr>'
          overview_table=f'<table class="skills-table"><thead><tr><th>Rank</th><th>Function</th><th>Count</th><th>% of total</th><th>Student search implication</th></tr></thead><tbody>{ov_body}</tbody></table>'
          trend_head=''.join(f'<th>{y}</th>' for y in years)
          trend_rows=''.join(table_row(n,v,n=='Other / Unclassified') for n,v in rows)
          total_vals=''.join(f'<td><strong>{v}</strong></td>' for v in totals)
          trend_table=f'<table class="skills-table"><thead><tr><th>Function</th>{trend_head}<th>Total</th></tr></thead><tbody>{trend_rows}<tr style="background:var(--gray-100);"><td><strong>Total</strong></td>{total_vals}<td><strong>617</strong></td></tr></tbody></table>'
          html=Path('index.html').read_text(encoding='utf-8')
          soup=BeautifulSoup(html,'html.parser')
          overview=soup.find(id='overview')
          section=overview.find('div', class_='section') if overview else None
          if section:
              d=section.find(class_='section-desc')
              if d: d.clear(); d.append('Functional areas of the jobs MSBA graduates accepted (2018–2025), using the updated FDS Historical function extract and consolidated analytics labels. Use this as directional evidence while you are exploring: the largest categories show where MSBA outcomes have been most common, but they do not limit what you can pursue with a clear story and evidence.')
              old=section.find('div', class_='insight-row')
              if old: old.replace_with(BeautifulSoup(insights,'html.parser'))
              t=section.find('table', class_='skills-table')
              if t: t.replace_with(BeautifulSoup(overview_table,'html.parser'))
          trends=soup.find(id='trends')
          if trends:
              d=trends.find(class_='section-desc')
              if d: d.clear(); d.append('Year-by-year breakdown of the functions MSBA graduates were hired into, updated with the attached FDS Historical function extract. 617 graduate outcomes total for 2018–2025.')
              sub=trends.find('div', class_='trend-chart-sub')
              if sub: sub.string='Updated FDS function counts · 2018–2025 cohorts'
              for table in trends.find_all('table', class_='skills-table'):
                  headers=[th.get_text(strip=True) for th in table.find_all('th')]
                  if headers and headers[0].lower()=='function' and '2018' in headers:
                      table.replace_with(BeautifulSoup(trend_table,'html.parser'))
                      break
          Path('index.html').write_text(str(soup), encoding='utf-8')
          PY
      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No function data updates needed."
          else
            git commit -m "Update function outcome tables [skip function data]"
            git push
          fi
